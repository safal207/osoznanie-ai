name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  schema:
    name: schema contracts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: python -m pip install -q -e ".[dev]"
      - name: Check Evidence schema
        run: python -c "from pathlib import Path; from osoznanie.schema import schema_documents; f='evidence.schema.json'; assert Path('schemas', f).read_text() == schema_documents()[f]"
      - name: Check Lesson schema
        run: python -c "from pathlib import Path; from osoznanie.schema import schema_documents; f='lesson.schema.json'; assert Path('schemas', f).read_text() == schema_documents()[f]"
      - name: Check RecallQuery schema
        run: python -c "from pathlib import Path; from osoznanie.schema import schema_documents; f='recall-query.schema.json'; assert Path('schemas', f).read_text() == schema_documents()[f]"
      - name: Check RecallResult schema
        run: python -c "from pathlib import Path; from osoznanie.schema import schema_documents; f='recall-result.schema.json'; assert Path('schemas', f).read_text() == schema_documents()[f]"
      - name: Verify all generated schemas
        run: python -m osoznanie.schema --check

  lint:
    needs: schema
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: python -m pip install -q -e ".[dev]"
      - name: Lint package public API
        run: ruff check src/osoznanie/__init__.py
      - name: Lint public API test
        run: ruff check tests/test_public_api.py
      - name: Lint remaining project
        run: ruff check . --exclude src/osoznanie/__init__.py --exclude tests/test_public_api.py

  test:
    needs: [schema, lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: python -m pip install -q -e ".[dev]"
      - name: Test
        run: pytest

  benchmark:
    name: benchmark reports
    needs: [schema, lint, test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: python -m pip install -q -e ".[dev]"
      - name: Generate retrieval report
        run: python -m benchmarks.run --output benchmark-results/retrieval
      - name: Generate decision simulation report
        run: python -m benchmarks.run_simulation --output benchmark-results/decision
      - name: Upload retrieval report
        uses: actions/upload-artifact@v4
        with:
          name: retrieval-quality-report
          path: benchmark-results/retrieval/
          if-no-files-found: error
      - name: Upload decision simulation report
        uses: actions/upload-artifact@v4
        with:
          name: decision-simulation-report
          path: benchmark-results/decision/
          if-no-files-found: error
