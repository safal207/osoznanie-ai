name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  schema:
    name: schema contracts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: python -m pip install -q -e ".[dev]"
      - name: Check Evidence schema
        run: python -c "from pathlib import Path; from osoznanie.schema import schema_documents; f='evidence.schema.json'; assert Path('schemas', f).read_text() == schema_documents()[f]"
      - name: Check Lesson schema
        run: python -c "from pathlib import Path; from osoznanie.schema import schema_documents; f='lesson.schema.json'; assert Path('schemas', f).read_text() == schema_documents()[f]"
      - name: Check RecallQuery schema
        run: python -c "from pathlib import Path; from osoznanie.schema import schema_documents; f='recall-query.schema.json'; assert Path('schemas', f).read_text() == schema_documents()[f]"
      - name: Check RecallResult schema
        run: python -c "from pathlib import Path; from osoznanie.schema import schema_documents; f='recall-result.schema.json'; assert Path('schemas', f).read_text() == schema_documents()[f]"
      - name: Verify all generated schemas
        run: python -m osoznanie.schema --check

  lint:
    needs: schema
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: python -m pip install -q -e ".[dev]"
      - name: Produce Ruff diagnostics
        continue-on-error: true
        run: |
          ruff check . --fix > ruff-output.txt 2>&1
          git diff > ruff-fix.patch
      - name: Upload Ruff diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: ruff-diagnostics
          path: |
            ruff-output.txt
            ruff-fix.patch
          if-no-files-found: error
      - name: Verify clean lint state
        run: |
          cat ruff-output.txt
          test ! -s ruff-fix.patch
          ruff check .

  test:
    needs: [schema, lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: python -m pip install -q -e ".[dev]"
      - name: Test
        run: pytest

  benchmark:
    name: retrieval benchmark
    needs: [schema, lint, test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: python -m pip install -q -e ".[dev]"
      - name: Generate benchmark reports
        run: python -m benchmarks.run --output benchmark-results
      - name: Upload benchmark reports
        uses: actions/upload-artifact@v4
        with:
          name: retrieval-quality-report
          path: benchmark-results/
          if-no-files-found: error
