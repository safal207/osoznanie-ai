name: pytest diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: python -m pip install -q -e ".[dev]"
      - name: Capture pytest output
        shell: bash
        run: |
          set +e
          pytest > pytest-output.txt 2>&1
          status=$?
          cat pytest-output.txt
          echo "$status" > pytest-exit-code.txt
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics-pr21
          path: |
            pytest-output.txt
            pytest-exit-code.txt
          if-no-files-found: error
